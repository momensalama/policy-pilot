services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: policy_pilot
      POSTGRES_USER: policy_pilot
      POSTGRES_PASSWORD: policy_pilot_secret
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U policy_pilot -d policy_pilot"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
